apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  labels:
    app: apishield-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: apishield-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apishield-postgres
  template:
    metadata:
      labels:
        app: apishield-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: n8n_user
            - name: POSTGRES_PASSWORD
              value: n8n_password
            - name: POSTGRES_DB
              value: n8n_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: apishield-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: apishield-postgres
  type: ClusterIP
