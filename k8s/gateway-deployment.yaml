apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: apishield-gateway
spec:
  replicas: 2 # Scale to 2 replicas for load balancing demonstration
  selector:
    matchLabels:
      app: apishield-gateway
  template:
    metadata:
      labels:
        app: apishield-gateway
    spec:
      containers:
        - name: gateway
          image: apishield-gateway:latest # Pulls local image built via docker
          imagePullPolicy: IfNotPresent # Allows Kubernetes to use locally built images
          env:
            - name: PORT
              value: "8000"
            - name: REDIS_URL
              value: redis://redis:6379
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /admin/metrics
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /admin/metrics
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: apishield-gateway
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: apishield-gateway
  type: LoadBalancer
