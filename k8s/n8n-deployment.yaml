apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-pvc
  labels:
    app: apishield-n8n
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  labels:
    app: apishield-n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apishield-n8n
  template:
    metadata:
      labels:
        app: apishield-n8n
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: n8n_db
            - name: DB_POSTGRESDB_USER
              value: n8n_user
            - name: DB_POSTGRESDB_PASSWORD
              value: n8n_password
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "false"
          ports:
            - containerPort: 5678
          volumeMounts:
            - name: n8n-storage
              mountPath: /home/node/.n8n
      volumes:
        - name: n8n-storage
          persistentVolumeClaim:
            claimName: n8n-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  labels:
    app: apishield-n8n
spec:
  ports:
    - port: 5678
      targetPort: 5678
  selector:
    app: apishield-n8n
  type: LoadBalancer
